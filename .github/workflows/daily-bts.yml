name: Daily BTS Picks

on:
  workflow_dispatch:
  schedule:
    # 10:00 AM Eastern during daylight saving time. Adjust seasonally if needed.
    - cron: "0 14 * * *"

jobs:
  build-and-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch today's input data
        run: python train_model.py

      - name: Build training data and train model
        run: python build_training_from_input.py

      - name: Predict today's picks
        run: python predict_todays_picks.py

      - name: Upload run outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bts-run-${{ github.run_number }}
          path: |
            data/input/
            models/
            picks/
            logs/
          if-no-files-found: ignore
