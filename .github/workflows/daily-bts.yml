name: Daily BTS Picks

on:
  workflow_dispatch:
  schedule:
    # 12:00 PM Eastern during daylight saving time. Adjust seasonally if needed.
    - cron: "0 16 * * *"

jobs:
  build-and-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch today's input data
        run: python train_model.py

      - name: Build training data and train model
        run: python build_training_from_input.py

      - name: Predict today's picks
        run: python predict_todays_picks.py

      - name: Locate latest picks file
        if: always()
        id: latest-results
        shell: bash
        run: |
          latest_picks="$(ls -t picks/picks_*.csv 2>/dev/null | head -n 1 || true)"
          latest_candidates="$(ls -t picks/all_candidates_*.csv 2>/dev/null | head -n 1 || true)"
          echo "picks_path=$latest_picks" >> "$GITHUB_OUTPUT"
          echo "candidates_path=$latest_candidates" >> "$GITHUB_OUTPUT"

          {
            echo "## Daily BTS Picks"
            echo
            if [ -n "$latest_picks" ]; then
              echo "Latest picks file: \`$latest_picks\`"
              echo
              echo "\`\`\`csv"
              cat "$latest_picks"
              echo "\`\`\`"
            else
              echo "No picks CSV was generated."
            fi

            echo
            echo "## Candidate Ranking"
            echo
            if [ -n "$latest_candidates" ]; then
              echo "Latest candidates file: \`$latest_candidates\`"
              echo
              echo "\`\`\`csv"
              head -n 16 "$latest_candidates"
              echo "\`\`\`"
            else
              echo "No all-candidates CSV was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload latest picks CSV
        if: always() && steps.latest-results.outputs.picks_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: latest-bts-picks
          path: ${{ steps.latest-results.outputs.picks_path }}
          if-no-files-found: error

      - name: Upload latest candidates CSV
        if: always() && steps.latest-results.outputs.candidates_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: latest-bts-candidates
          path: ${{ steps.latest-results.outputs.candidates_path }}
          if-no-files-found: error

      - name: Upload run outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bts-run-${{ github.run_number }}
          path: |
            data/input/
            models/
            picks/
            logs/
          if-no-files-found: ignore
